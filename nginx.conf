server {
    if ($host = sbwy.gavinmorrow.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;

    server_name sbwy.gavinmorrow.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    ssl_certificate /etc/letsencrypt/live/sbwy.gavinmorrow.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sbwy.gavinmorrow.com/privkey.pem; # managed by Certbot

    server_name sbwy.gavinmorrow.com;

    location / {
        # proxy_pass https://0.0.0.0:4433;
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
    }
}

server {
    listen 3333 ssl;
    listen [::]:3333 ssl;

    ssl_certificate /etc/letsencrypt/live/sbwy.gavinmorrow.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sbwy.gavinmorrow.com/privkey.pem; # managed by Certbot

    server_name sbwy.gavinmorrow.com;

    location / {
        # proxy_pass https://0.0.0.0:3000;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
    }
}
